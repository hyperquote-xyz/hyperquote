<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HyperQuote Twitter/X Banner — 1500×500
       Centered logo mark + wordmark on dark background -->

  <rect width="1500" height="500" fill="#0F1722"/>

  <!-- Subtle background glow -->
  <radialGradient id="ban-glow" cx="50%" cy="50%" r="30%">
    <stop offset="0%" stop-color="#2BB8A4" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#2BB8A4" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="750" cy="250" rx="500" ry="200" fill="url(#ban-glow)"/>

  <!-- Logo mark — V4D centered at (660, 250), size ~100 -->
  <g transform="translate(610, 200) scale(0.195)">
    <radialGradient id="ban-lg" cx="52%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#2BB8A4" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#2BB8A4" stop-opacity="0"/>
    </radialGradient>

    <rect width="512" height="512" rx="112" fill="#1A2636"/>

    <circle cx="266" cy="266" r="200" fill="url(#ban-lg)"/>

    <linearGradient id="ban-top" x1="190" y1="140" x2="412" y2="80">
      <stop offset="0%" stop-color="#40E8C8" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#40E8C8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#40E8C8"/>
    </linearGradient>

    <linearGradient id="ban-bot" x1="100" y1="300" x2="412" y2="420">
      <stop offset="0%" stop-color="#40E8C8"/>
      <stop offset="50%" stop-color="#34D9B8"/>
      <stop offset="100%" stop-color="#2BB8A4"/>
    </linearGradient>

    <path d="M190 240 C 240 236, 280 210, 310 170 C 340 132, 370 98, 412 98 L 412 144 C 370 144, 340 174, 310 208 C 280 244, 240 258, 200 256 Z" fill="url(#ban-top)"/>
    <path d="M100 252 C 150 252, 190 260, 230 268 C 260 274, 280 294, 310 334 C 340 374, 370 414, 412 414 L 412 460 C 370 460, 340 420, 310 380 C 280 340, 260 304, 230 290 C 190 278, 150 268, 100 268 Z" fill="url(#ban-bot)"/>
  </g>

  <!-- Wordmark -->
  <text x="720" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" letter-spacing="-0.02em">
    <tspan fill="#F0F2F5">Hyper</tspan><tspan fill="#2BB8A4">Quote</tspan>
  </text>
</svg>
